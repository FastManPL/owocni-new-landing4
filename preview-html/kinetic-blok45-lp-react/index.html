/* --- Lokalne custom properties (ex-:root) --- */
#blok-4-5-section {
    --bg-color: #f7f6f4;

    /* Tło dopiero po klasie .blok45-bg-ready (po domknięciu fali w JS) — inaczej psuje przejście z Kinetic. */
    /* Nad #bridge-wrapper (z-index:10) — cała sekcja nad Kinetic. */
    z-index: 12;
    isolation: isolate; /* FACTORY: B-ISO-01 — stacking context */
    /* Integracja LP: sekcja wyżej w flow — intro widać wcześniej u dołu ekranu podczas końcówki Kinetic + wave */
    margin-top: clamp(-92vh, -64vh, -44vh);
    overflow: visible; /* „i wychodzą” — napis musi móc wychodzić w bok (translateX) */
}

    z-index: 30001;

    background: var(--bg-color);

/* backdrop-filter miesza w live treść pod overlay; wyłączamy przy popupie i zostawiamy mocniejszy kolor (bez próbkowania Kinetic). */

@media (min-width: 640px) {
    #blok-4-5-section .tile-bottom { gap: 8px; }
}
#blok-4-5-section .tile-value { font-weight: 700; font-size: clamp(26px, 6.5vw, 48px); line-height: 1; color: var(--ink); letter-spacing: -0.02em; padding: clamp(2px, 0.5vw, 4px) 0; transition: transform .35s cubic-bezier(0.34, 1.56, 0.64, 1); }
#blok-4-5-section .tile:has(.popup-btn:hover) .tile-value,
#blok-4-5-section .tile:has(.tile-label:hover) .tile-value { transform: scale(1.2); }
#blok-4-5-section .tile-wrap.chosen .tile-value,
#blok-4-5-section .tile-wrap.dimmed .tile-value { transform: none; }
#blok-4-5-section .popup-btn { border: 0; border-radius: 14px; padding: clamp(10px, 2vw, 13px) 24px; cursor: pointer; font-weight: 600; font-size: clamp(13px, 2vw, 15px); background: var(--ink); color: var(--paper,#faf7f2); transition: all .2s ease; letter-spacing: .3px; width: 100%; font-family: var(--font-brand, 'Lexend'), 'Lexend', sans-serif; text-align: center; box-sizing: border-box; display: inline-block; }
#blok-4-5-section .popup-btn:hover { background: #ffc602; color: #1a1610; }
#blok-4-5-section .popup-btn:disabled { opacity: .35; cursor: not-allowed; background: var(--ink-faint); color: var(--paper-deep); }
#blok-4-5-section .popup-btn:disabled:hover { background: var(--ink-faint); color: var(--paper-deep); }
#blok-4-5-section .tile-wrap.chosen .tile .popup-btn { display: none; }
#blok-4-5-section .tile-wrap.dimmed .popup-btn { background: var(--ink-faint); color: var(--paper-deep); cursor: default; }
#blok-4-5-section .codebox { display: none; border-radius: 12px; padding: 10px 14px; border: 1px dashed var(--card-border); background: var(--paper-deep); font-weight: 500; font-size: clamp(11px, 1.8vw, 14px); color: var(--ink-light); text-align: center; width: 100%; line-height: 1.4; animation: blok-4-5-revealCode .45s cubic-bezier(.4,0,.2,1); }
#blok-4-5-section .tile-wrap.chosen .codebox { display: block; }
#blok-4-5-section .codebox span { color: var(--terracotta); font-weight: 700; }
@keyframes blok-4-5-revealCode { from { opacity: 0; transform: translateY(6px) scale(.96); } to { opacity: 1; transform: translateY(0) scale(1); } }
#blok-4-5-section .bottom-close { display: flex; justify-content: center; padding-top: clamp(4px,1vw,8px); }
#blok-4-5-section .bottom-close-btn { all: unset; cursor: pointer; font-size: clamp(11px,2.5vw,13px); color: var(--ink-faint); display: flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 999px; transition: color .2s, background .2s; }
#blok-4-5-section .bottom-close-btn:hover { color: var(--ink); background: var(--paper-deep); }
#blok-4-5-section .x-icon { font-size: 0.9em; opacity: 0.7; }
#blok-4-5-section .morph-ghost { position: fixed; pointer-events: none; z-index: 9998; opacity: 0; border-radius: 0; }

/* Wave — nad Kinetic (#bridge-wrapper 10), pod intro / tekstami na ilustracji (z-index 25). */
#blok-4-5-section .blok-4-5-wave-wrap {
    position: fixed;
    inset: 0;
    z-index: 14;
    pointer-events: none;
    overflow: hidden;
    background: transparent;
}
#blok-4-5-section .blok-4-5-wave-overlay {
    width: 100%; height: 100%;
    pointer-events: none; position: absolute; top: 0; left: 0;
    z-index: 1;
    /* will-change: contents usunięte — ograniczenie budżetu will-change w dokumencie */
}
#blok-4-5-section .blok-4-5-wave-overlay .wave-path:nth-of-type(1) { fill: #f5ede1; }
#blok-4-5-section .blok-4-5-wave-overlay .wave-path:nth-of-type(2) { fill: #ebe3d1; }
#blok-4-5-section .blok-4-5-wave-overlay .wave-path:nth-of-type(3) { fill: #edd9d0; }
#blok-4-5-section .blok-4-5-wave-overlay .wave-path:nth-of-type(4) { fill: #f7f6f4; }
/* Bez aktywnej kurtyny — zero malowania fali (JS ustawia display; to zabija resztki pathów przy Mozemy). */
#blok-4-5-section:not(.wave-reveal-active) .blok-4-5-wave-wrap {
    opacity: 0 !important;
    visibility: hidden !important;
    pointer-events: none !important;
}

/* DEV debug */
#blok-4-5-section #blok-4-5-res-debug { display: none; position: fixed; bottom: 12px; right: 12px; background: rgba(0,0,0,.7); color: #fff; font-size: 12px; padding: 4px 10px; border-radius: 4px; z-index: 9999; font-family: monospace; }
#blok-4-5-section.debug-mode #blok-4-5-res-debug { display: block; }

  </style>
