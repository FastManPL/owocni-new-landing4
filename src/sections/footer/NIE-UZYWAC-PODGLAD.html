function init(container) {
'use strict';

var $ = function(sel){ return container.querySelector(sel); };

var $id = function(id){ return container.querySelector('#' + id); };
var getScroll = function(){ return window.lenis ? window.lenis.scroll : window.scrollY; };

var cleanups = [];
var gsapInstances = [];

var CC={posX:-1.10,posY:0.75,posZ:2.20,scale:0.20,rotX:0.07,rotY:0.31,rotZ:0.15};
var levFrozen=false;

var REF_ASPECT=1000/971;
function getContentRect(w,h){
  var va=w/h;
  if(va>REF_ASPECT){
    var cw=h*REF_ASPECT;
    return{ox:(w-cw)/(2*w),oy:0,sx:cw/w,sy:1.0};
  }else{
    var ch=w/REF_ASPECT;
    return{ox:0,oy:(h-ch)/(2*h),sx:1.0,sy:ch/h};
  }
}

function getBannerLayout(w){
  var cw=Math.min(0.92*w,1750),cm=(w-cw)/2;
  return{textLeft:cm+Math.max(32,Math.min(0.05*w,128))};
}

var P={
  lightX:-0.075,lightY:0.2,lightOM:2.0,lightRX:2.8,lightRY:1.9,lightZ:1.2,
  lightInt:6.5,lightFall:7.2,lightFoc:0.6,lightCol:'#e3e3e3',
  shadX:0.015,shadY:-0.105,shadSX:0.12,shadSY:0.055,shadStr:4.0,shadDark:0.8,
  shad2X:0.015,shad2Y:0.075,shad2SX:0.275,shad2SY:0.25,shad2Str:1.2,shad2Dark:1.0,
  bulgeX:0.115,bulgeY:0.105,bulgeH:0.65,
  specExp:20,specInt:0.8,specStr:0.10,
  ambFloor:0.32,bevel:0.22,

function makeTexture(w,h){
  var cv=document.createElement('canvas'),cx=cv.getContext('2d');
  if(!cx) return {tex:new THREE.Texture(), textCenter:{x:0.5,y:0.5}, textRadius:1, compScale:1.0, layout:{}};
  var dpr=Math.min(window.devicePixelRatio||1,2);
  cv.width=w*dpr;cv.height=h*dpr;
  cx.fillStyle='#f7f6f4';cx.fillRect(0,0,cv.width,cv.height);
  
  var cr=getContentRect(w,h);
  var cTop=cr.oy*cv.height,cWidth=cr.sx*cv.width,cHeight=cr.sy*cv.height;
  
  var gs=Math.max(20*dpr,Math.min(40*dpr,cWidth*0.025));
  var gCv=document.createElement('canvas');gCv.width=cv.width;gCv.height=cv.height;
  var gc=gCv.getContext('2d');gc.strokeStyle='rgba(0,0,0,0.055)';gc.lineWidth=1*dpr;
  for(var gy=0;gy<cv.height;gy+=gs){gc.beginPath();gc.moveTo(0,gy);gc.lineTo(cv.width,gy);gc.stroke();}
  for(var gx=0;gx<cv.width;gx+=gs){gc.beginPath();gc.moveTo(gx,0);gc.lineTo(gx,cv.height);gc.stroke();}
  gc.globalCompositeOperation='destination-in';
  var hG=gc.createLinearGradient(0,0,cv.width,0);
  hG.addColorStop(0,'rgba(0,0,0,0)');hG.addColorStop(0.15,'rgba(0,0,0,1)');
  hG.addColorStop(0.85,'rgba(0,0,0,1)');hG.addColorStop(1,'rgba(0,0,0,0)');
  gc.fillStyle=hG;gc.fillRect(0,0,cv.width,cv.height);
  var vG=gc.createLinearGradient(0,0,0,cv.height);
  vG.addColorStop(0,'rgba(0,0,0,0)');vG.addColorStop(0.20,'rgba(0,0,0,1)');
  vG.addColorStop(0.80,'rgba(0,0,0,1)');vG.addColorStop(1,'rgba(0,0,0,0)');
  gc.fillStyle=vG;gc.fillRect(0,0,cv.width,cv.height);
  cx.drawImage(gCv,0,0);
  
  var lines=['DOBRY','CZAS','JEST','TERAZ'];
  var _bl=getBannerLayout(w);
  var _textLeft=_bl.textLeft;
  var W_START=1650,W_END=1200,MIN_MARGIN=30;

  var fsNatural=Math.min(Math.max(80*dpr,cWidth*0.17),220*dpr);
  var _testCtx=document.createElement('canvas').getContext('2d');
  _testCtx.font='700 '+fsNatural+'px "Lexend",sans-serif';
  var _maxWord=Math.max.apply(null,lines.map(function(l){return _testCtx.measureText(l).width;}));

  var _leftMargin,_maxTxtW,fs,pl,sy,lh,th;
  
  if(w<1200){
    _leftMargin=MIN_MARGIN;
    _maxTxtW=(w-2*MIN_MARGIN)*dpr;
    fs=(_maxWord>_maxTxtW)?fsNatural*(_maxTxtW/_maxWord)*0.98:fsNatural;
    fs=Math.max(36*dpr,fs);
    lh=fs*0.8;th=lines.length*lh;
    var mw2=_maxWord*(fs/fsNatural);
    pl=cv.width/2-mw2/2;
    pl=Math.max(MIN_MARGIN*dpr,pl);
    sy=100*dpr+fs*0.75;
  } else {
    var _t=w>=W_START?0:(W_START-w)/(W_START-W_END);
    _leftMargin=_textLeft*(1-_t)+MIN_MARGIN*_t;
    var _cardLeft=Math.max(_textLeft, w-_textLeft-500);
    var _gapToCard=40;
    _maxTxtW=(_cardLeft - _leftMargin - _gapToCard)*dpr;
    fs=(_maxTxtW>0&&_maxWord>_maxTxtW)?fsNatural*(_maxTxtW/_maxWord)*0.98:fsNatural;
    fs=Math.max(40*dpr,fs);
    lh=fs*0.8;th=lines.length*lh;
    pl=_leftMargin*dpr;
    sy=cTop+(cHeight-th)/2+fs*0.75;
  }
  
  cx.font='700 '+fs+'px "Lexend",sans-serif';
  cx.textAlign='left';cx.textBaseline='alphabetic';
  var mw=0;lines.forEach(function(l){mw=Math.max(mw,cx.measureText(l).width);});
  var tTop=sy-fs*0.75,cx2=pl+mw/2,cy2=tTop+th/2,hl=0.7071*(mw+th)/2;
  var tg=cx.createLinearGradient(cx2-0.7071*hl,cy2-0.7071*hl,cx2+0.7071*hl,cy2+0.7071*hl);
  tg.addColorStop(0.02,'#252030');tg.addColorStop(0.44,'#2a2130');
  tg.addColorStop(0.567,'#382630');tg.addColorStop(0.675,'#512b2b');
  tg.addColorStop(0.802,'#7d3527');tg.addColorStop(1.0,'#7d3527');
  cx.fillStyle=tg;
  lines.forEach(function(l,i){cx.fillText(l,pl,sy+i*lh);});
  
  var tcxRaw=(pl+mw*0.5)/cv.width,tcyRaw=(sy-fs*0.75+th*0.5)/cv.height;
  var tcxC=(tcxRaw-cr.ox)/cr.sx,tcyC=1.0-((tcyRaw-cr.oy)/cr.sy);
  var tRad=Math.max(mw/cv.width/cr.sx,th/cv.height/cr.sy)*0.6;
  var t=new THREE.CanvasTexture(cv);
  t.minFilter=THREE.LinearFilter;t.magFilter=THREE.LinearFilter;t.needsUpdate=true;
  
  var retCompScale=w<1200?(fs/(Math.min(Math.max(80*dpr,cWidth*0.17),220*dpr))):1.0;
  var layoutInfo={ fs:fs/dpr, lh:fs*0.8/dpr, textTopPx:w<1200?100:null, isMobile:w<1200 };
  return{tex:t,textCenter:{x:tcxC,y:tcyC},textRadius:tRad,compScale:retCompScale,layout:layoutInfo};
}

function makeGlassShape(w,h,r){
  var s=new THREE.Shape(),sr=Math.min(r,w/2-0.01,h/2-0.01),x=-w/2,y=-h/2;
  s.moveTo(x+sr,y);s.lineTo(x+w-sr,y);s.quadraticCurveTo(x+w,y,x+w,y+sr);
  s.lineTo(x+w,y+h-sr);s.quadraticCurveTo(x+w,y+h,x+w-sr,y+h);
  s.lineTo(x+sr,y+h);s.quadraticCurveTo(x,y+h,x,y+h-sr);
  s.lineTo(x,y+sr);s.quadraticCurveTo(x,y,x+sr,y);
  return s;
}

function buildDigitTex(n){
  var cv=document.createElement('canvas');cv.width=256;cv.height=384;
  var ctx=cv.getContext('2d');
  ctx.fillStyle='white';ctx.fillRect(0,0,256,384);
  ctx.fillStyle='black';ctx.font='700 340px "Lexend",sans-serif';
  ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(n,128,200);
  var t=new THREE.CanvasTexture(cv);t.minFilter=THREE.LinearFilter;
  return t;
}

var digitTex=[];
var CLOCK_FDW=0,CLOCK_FDH=0,CLOCK_TOTAL_W=0;
var dayTexCache = null;

  // === MAIN BODY ===
  var el=$id('final-scene');
  if(!el) return { pause:function(){}, resume:function(){}, kill:function(){} };
  var w=el.clientWidth,h=el.clientHeight;
  var dpr=Math.min(window.devicePixelRatio||1,2);
  var renderer;
  try {
    renderer=new THREE.WebGLRenderer({antialias:dpr<1.5}); // N2: AA tylko na low-DPR
  } catch(e) {
    return { pause:function(){}, resume:function(){}, kill:function(){} };
  }
  renderer.setSize(w,h);
  renderer.setPixelRatio(dpr);
  renderer.toneMapping=THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure=0.75;
  el.appendChild(renderer.domElement);

  // WebGL context lost/restored
  // contextlost: NAPRAW-TERAZ — stop loop, prevent rendering on dead resources
  // contextrestored: P2A zdecyduje o strategii recovery (COLD→WARM→HOT)
  renderer.domElement.addEventListener('webglcontextlost', function(e){
    e.preventDefault(); // Pozwala na późniejsze restore
    isPageVisible = false;
    if(ticking){ gsap.ticker.remove(tickFn); ticking=false; }
  }, false);
  renderer.domElement.addEventListener('webglcontextrestored', function(){
    // P2A: Tu będzie pełny recovery lifecycle (WARM→HOT)
    // Na razie: wznów loop — Three.js odbuduje wewnętrzne stany przy renderze
    isPageVisible = true;
    _lastTime = performance.now();
    if(!ticking && tickFn){ gsap.ticker.add(tickFn); ticking=true; }
  }, false);

  var scene=new THREE.Scene();
  scene.background=new THREE.Color('#f7f6f4');
  var pmrem=new THREE.PMREMGenerator(renderer);
  var envRT=pmrem.fromScene(new RoomEnvironment());
  scene.environment=envRT.texture;
  pmrem.dispose(); 

  var d1=new THREE.DirectionalLight(0xfff0e8,3.5);d1.position.set(3,5,6);scene.add(d1);

  var vFov=55*Math.PI/180,planeH=5,camZ=(planeH/2)/Math.tan(vFov/2);
  var camera=new THREE.PerspectiveCamera(55,w/h,0.1,200);
  camera.position.z=camZ;
  
  var planeW=planeH*(w/h),cr=getContentRect(w,h),texRes=makeTexture(w,h);
  var textCenter=texRes.textCenter,textRadius=texRes.textRadius;
  var compScaleVal=texRes.compScale||1.0;
  var layoutInfo=texRes.layout||{};
  var uMouse={value:new THREE.Vector2(0,0)};

  var U={
    uTexture:{value:texRes.tex},uMouse:uMouse,
    uContentOffset:{value:new THREE.Vector2(cr.ox,cr.oy)},
    uContentScale:{value:new THREE.Vector2(cr.sx,cr.sy)},
    uLightOffset:{value:new THREE.Vector2(P.lightX,P.lightY)},uLightOM:{value:P.lightOM},
    uLightReach:{value:new THREE.Vector2(P.lightRX,P.lightRY)},uLightZ:{value:P.lightZ},
    uLightInt:{value:P.lightInt},uLightFall:{value:P.lightFall},uLightFoc:{value:P.lightFoc},
    uLightColor:{value:new THREE.Color(P.lightCol)},
    uShadowOffset:{value:new THREE.Vector2(P.shadX,P.shadY)},
    uShadowSize:{value:new THREE.Vector2(P.shadSX,P.shadSY)},
    uShadowStr:{value:P.shadStr},uShadowDark:{value:P.shadDark},
    uShadow2Offset:{value:new THREE.Vector2(P.shad2X,P.shad2Y)},
    uShadow2Size:{value:new THREE.Vector2(P.shad2SX,P.shad2SY)},
    uShadow2Str:{value:P.shad2Str},uShadow2Dark:{value:P.shad2Dark},
    uBulgeSize:{value:new THREE.Vector2(P.bulgeX,P.bulgeY)},uBulgeH:{value:P.bulgeH},
    uSpecExp:{value:P.specExp},uSpecInt:{value:P.specInt},uSpecStr:{value:P.specStr},
    uBevel:{value:P.bevel},
    uGradStr:{value:P.gradStr},uGradDir:{value:new THREE.Vector2(P.gradDirX,P.gradDirY).normalize()}, // O1: pre-normalized
    uGradStart:{value:P.gradStart},uGradEnd:{value:P.gradEnd},
    uDirMin:{value:P.dirMin},uDirRng:{value:P.dirRng},uAmbientFloor:{value:P.ambFloor}
  };

  var mat=new THREE.ShaderMaterial({
    uniforms:U,
    extensions:{derivatives:true},
    vertexShader:[
      'uniform vec2 uMouse,uBulgeSize,uContentOffset,uContentScale;',
      'uniform float uBulgeH;',
      'varying vec2 vUv,vContentUv; varying vec3 vWorldPos;',
      'float gauss(vec2 u,vec2 c,vec2 s){vec2 d=(u-c)/s;return exp(-0.5*dot(d,d));}',
      'void main(){',
      '  vUv=uv; vContentUv=(uv-uContentOffset)/uContentScale;',
      '  vec2 mc=uMouse*0.5+0.5; vec3 pos=position;',
      '  float eL=smoothstep(0.,0.12,uv.x),eR=smoothstep(0.,0.12,1.-uv.x);',
      '  float eB=smoothstep(0.,0.18,uv.y),eT=smoothstep(0.,0.18,1.-uv.y);',
      '  pos.z+=gauss(vContentUv,mc,uBulgeSize)*uBulgeH*(eL*eR*eB*eT);',
      '  vec4 wp=modelMatrix*vec4(pos,1.); vWorldPos=wp.xyz;',
      '  gl_Position=projectionMatrix*viewMatrix*wp;',
      '}'
    ].join('\n'),
    fragmentShader:[
      'uniform sampler2D uTexture;',
      'uniform vec2 uMouse,uLightOffset,uLightReach,uShadowOffset,uShadowSize,uShadow2Offset,uShadow2Size,uBulgeSize,uGradDir;',
      'uniform float uLightOM,uLightZ,uLightInt,uLightFall,uLightFoc; uniform vec3 uLightColor;',
      'uniform float uShadowStr,uShadowDark,uShadow2Str,uShadow2Dark;',
      'uniform float uSpecExp,uSpecInt,uSpecStr,uBevel,uGradStr,uGradStart,uGradEnd;',
      'uniform float uDirMin,uDirRng,uAmbientFloor;',
      'varying vec2 vUv,vContentUv; varying vec3 vWorldPos;',
      'void main(){',
      '  vec4 tex=texture2D(uTexture,vUv);',
      '  vec2 cUv=vContentUv,mUv=uMouse*0.5+0.5;',
      '  vec3 N=normalize(cross(dFdx(vWorldPos),dFdy(vWorldPos)));',
      '  float NdL=max(dot(N,vec3(-0.4969,0.3478,0.7950)),0.);', // O2: pre-normalized
      '  float dShade=uDirMin+NdL*uDirRng;',
      '  float lum=dot(tex.rgb,vec3(0.299,0.587,0.114));',
      '  vec3 bevelAdd=vec3((-clamp(dFdx(lum),-0.08,0.08)*0.6+clamp(dFdy(lum),-0.08,0.08)*0.4)*2.5*uBevel);',
      '  float tMask=1.-smoothstep(0.1,0.9,lum);',
      '  if(tMask<0.01){gl_FragColor=vec4(tex.rgb*dShade,1.);return;}',  // N1: EARLY EXIT
      '  vec3 pPos=vec3((uMouse.x+uLightOffset.x*uLightOM)*uLightReach.x,(uMouse.y+uLightOffset.y*uLightOM)*uLightReach.y,uLightZ);',
      '  vec3 toL=pPos-vWorldPos; float dist=length(toL); vec3 Lp=normalize(toL);',
      '  float atten=1./(1.+dist*dist*uLightFall);',
      '  float pLight=mix(atten,max(dot(N,Lp),0.)*atten,uLightFoc);',
      '  vec3 bc=tex.rgb*dShade;',
      '  bc+=bevelAdd;',
      '  vec2 sd1=(cUv-(mUv+uShadowOffset))/uShadowSize;',
      '  float bd1Sq=dot(sd1,sd1);',
      '  float dp1=clamp(1.-exp(-0.5*bd1Sq)*uShadowStr,0.,1.);',
      '  float dpF1=mix(dp1,max(dp1,uAmbientFloor),tMask); bc*=1.-(1.-dpF1)*uShadowDark*tMask;',
      '  vec2 sd2=(cUv-(mUv+uShadow2Offset))/uShadow2Size;',
      '  float bd2Sq=dot(sd2,sd2);',
      '  float dp2=clamp(1.-exp(-0.5*bd2Sq)*uShadow2Str,0.,1.);',
      '  float dpF2=mix(dp2,max(dp2,uAmbientFloor),tMask); bc*=1.-(1.-dpF2)*uShadow2Dark*tMask;',
      '  float totD=min(dpF1,dpF2);',
      '  float sg=smoothstep(uGradStart,uGradEnd,dot(vUv,uGradDir));', // O1: already normalized
      '  bc*=1.+sg*uGradStr*tMask*totD;',
      '  vec3 pc=uLightColor*pLight*tMask*dShade*uLightInt;',
      '  vec3 hd=normalize(Lp+vec3(0.,0.,1.)); hd.x*=uSpecStr; hd=normalize(hd);',
      '  vec3 sc=uLightColor*pow(max(dot(N,hd),0.),uSpecExp)*atten*tMask*dShade*uSpecInt;',
      '  vec3 fc=clamp(bc+pc+sc,0.,1.);',
      '  gl_FragColor=vec4(fc,1.);',
      '}'
    ].join('\n')
  });

  var geo=new THREE.PlaneGeometry(planeW,planeH,128,128); // R1: reduced tessellation
  var mesh=new THREE.Mesh(geo,mat);
  scene.add(mesh);

  // Glass clock
  var GW=4.4,GH=0.9,GR=2.0,GD=0.24,GB=0.11,CLOCK_Z=GD/2+GB+0.06;
  var CLOCK_SCALE=1.01,CLOCK_X=0.0,CLOCK_Y=-0.05;
  var CTOP=new THREE.Color(0x8b5190),CBOT=new THREE.Color(0xc2452b);

  var glassMat=new THREE.MeshPhysicalMaterial({
    color:0xffffff,transmission:1.0,roughness:0.03, // R2: removed clearcoat, reduced roughness
    ior:1.65,thickness:2.1,specularIntensity:0.75,
    envMapIntensity:1.25  // N3: usunięto DoubleSide (domyślnie FrontSide)
  });
  glassMat.onBeforeCompile=function(sh){
    sh.uniforms.rimCTop={value:CTOP.clone()};
    sh.uniforms.rimCBot={value:CBOT.clone()};
    sh.uniforms.rimPow={value:1.4};
    sh.uniforms.rimInt={value:25.0};
    sh.uniforms.glassHalfH={value:GH*0.5};
    sh.vertexShader=sh.vertexShader
      .replace('void main() {','varying vec3 vAp; varying float vAy; void main() {')
      .replace('#include <project_vertex>','#include <project_vertex>\nvAp=(modelViewMatrix*vec4(position,1.)).xyz;\nvAy=position.y;');
    sh.fragmentShader=sh.fragmentShader
      .replace('void main() {','varying vec3 vAp; varying float vAy;\nuniform vec3 rimCTop,rimCBot;\nuniform float rimPow,rimInt,glassHalfH;\nvoid main() {')
      .replace('#include <tonemapping_fragment>','{vec3 vn=normalize(vNormal);vec3 vv=vec3(0.,0.,1.);\nfloat rim=pow(1.-clamp(dot(vn,vv),0.,1.),rimPow);\nfloat tt=clamp(vAy/glassHalfH*0.5+0.5,0.,1.);\ngl_FragColor.rgb+=mix(rimCBot,rimCTop,tt)*rim*rimInt;}\n#include <tonemapping_fragment>');
  };
  glassMat.needsUpdate=true;

  var glassGeo=new THREE.ExtrudeGeometry(
    makeGlassShape(GW,GH,GR),
    {depth:GD,bevelEnabled:true,bevelSegments:8,bevelSize:0.09,bevelThickness:GB,curveSegments:32} // O5: reduced segments
  );
  glassGeo.center();
  // O4: Jeden parent dla obu grup (1 transform zamiast 2)
  var clockParent=new THREE.Group();
  var glassGroup=new THREE.Group(),clockGroup=new THREE.Group();
  scene.add(clockParent);
  clockParent.add(glassGroup);
  clockParent.add(clockGroup);
  glassGroup.add(new THREE.Mesh(glassGeo,glassMat));

  // Displacement map
  var dispMap=new THREE.Texture();
  dispMap.wrapS=dispMap.wrapT=THREE.RepeatWrapping;

  function buildClock(){
    while(clockGroup.children.length)clockGroup.remove(clockGroup.children[0]);
    slots.length=0;colonMats.length=0;dayMesh=null;dayMat=null;

    CLOCK_FDW=0.72*CLOCK_SCALE;
    CLOCK_FDH=CLOCK_FDW*1.5;
    var FSC=CLOCK_FDW/110;
    var sX=ORIG_X.map(function(p){return(p+55-ORIG_TOT/2)*FSC;});
    CLOCK_TOTAL_W=(sX[5]+CLOCK_FDW/2)-(sX[0]-CLOCK_FDW/2);

    for(var i=0;i<6;i++){
      var mat=makeDispMat();
      var mesh=new THREE.Mesh(new THREE.PlaneGeometry(CLOCK_FDW,CLOCK_FDH),mat);
      mesh.position.set(sX[i]+CLOCK_X,CLOCK_Y,CLOCK_Z);
      mesh.renderOrder=10;  // N6: stały porządek renderowania
      clockGroup.add(mesh);
      slots.push({mesh:mesh,mat:mat,curVal:-1,tgtVal:-1,isAnim:false});
    }

    var cx1=(sX[1]+sX[2])/2,cx2=(sX[3]+sX[4])/2;
    [cx1,cx2].forEach(function(cx){
      var cv=document.createElement('canvas');cv.width=80;cv.height=384;
      var ctx=cv.getContext('2d');
      ctx.fillStyle='white';ctx.fillRect(0,0,80,384);
      ctx.fillStyle='black';ctx.font='700 300px "Lexend",sans-serif';
      ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(':',40,192);
      var t=new THREE.CanvasTexture(cv);t.minFilter=THREE.LinearFilter;
      var cmat=new THREE.ShaderMaterial({
        uniforms:{uTex:{value:t},uAlpha:{value:1.0}},
        vertexShader:CVRT,fragmentShader:CFRG,transparent:true,depthWrite:false
      });
      colonMats.push(cmat);
      var m=new THREE.Mesh(new THREE.PlaneGeometry(CLOCK_FDW*0.3,CLOCK_FDH*0.85),cmat);
      m.position.set(cx+CLOCK_X,CLOCK_Y,CLOCK_Z);
      m.renderOrder=11;  // N6
      clockGroup.add(m);
    });

    dayMat=makeDispMat();
    dayMesh=new THREE.Mesh(new THREE.PlaneGeometry(CLOCK_TOTAL_W,CLOCK_FDH),dayMat);
    dayMesh.position.set(CLOCK_X,CLOCK_Y,CLOCK_Z);
    dayMesh.visible=false;
    dayMesh.renderOrder=12;  // N6
    clockGroup.add(dayMesh);

    prebakeDayTextures();
  }

  function showDay(){
    if(state!==ST.CLOCK)return;
    state=ST.TO_DAY;killAll();
    var rnd=Math.random()*10;
    var juzTex=dayTexCache.juzJest;
    _date.setTime(Date.now());
    var dayTex=dayTexCache.days[_date.getDay()];
    var dayStart=(1.0-OVERLAP)*TRANS_DUR;
    slots.forEach(function(slot){
      gsap.killTweensOf(slot.mat.uniforms.uT);slot.isAnim=false;
      slot.mat.uniforms.uTex1.value=slotTargetTex(slot);
      slot.mat.uniforms.uTex2.value=getBlankTex();
      slot.mat.uniforms.uRnd.value=rnd;slot.mat.uniforms.uT.value=0;
    });
    dayMesh.visible=true;
    dayMat.uniforms.uTex1.value=getBlankTex();
    dayMat.uniforms.uTex2.value=juzTex;
    dayMat.uniforms.uRnd.value=rnd;dayMat.uniforms.uT.value=0;

      nextCall=gsap.delayedCall(JUZ_HOLD,function(){

  function animateSlot(slot,newVal){
    if(slot.isAnim)return;
    var old=slot.curVal<0?newVal:slot.curVal;
    if(old===newVal&&slot.curVal>=0)return;
    slot.isAnim=true;slot.tgtVal=newVal;
    slot.mat.uniforms.uTex1.value=digitTex[old];
    slot.mat.uniforms.uTex2.value=digitTex[newVal];
    slot.mat.uniforms.uRnd.value=Math.random()*10;
    slot.mat.uniforms.uT.value=0;
    gsap.to(slot.mat.uniforms.uT,{value:1,duration:0.30,ease:'power2.in',onComplete:function(){
      slot.mat.uniforms.uTex1.value=digitTex[newVal];
      slot.mat.uniforms.uTex2.value=digitTex[newVal];
      gsap.to(slot.mat.uniforms.uT,{value:0,duration:0.30,ease:'power2.out',onComplete:function(){
        slot.isAnim=false;slot.curVal=newVal;slot.tgtVal=newVal;
      }});
    }});
  }

      }
    }
  }

      // Mobile: absolute — karta płynie z sekcją, nie jest ucinana
      cardEl.style.position='absolute';
      cardEl.style.top=cardTopPx+"px";
      cardEl.style.bottom='auto';
      cardEl.style.height='640px';
      var cardW=Math.min(500,cw2-40);
      cardEl.style.width=cardW+'px';
      cardEl.style.left=Math.round((cw2-cardW)/2)+'px';
      cardEl.style.transform='none';
      // Sekcja rośnie żeby zmieścić kartę + 40px padding
      var neededH=cardTopPx+640+40;
      container.style.minHeight=(neededH>vh?neededH:vh)+'px';
    } else if(cw2>=1200){
      // Desktop: fixed — karta przybita do viewportu
      cardEl.style.position='fixed';
      cardEl.style.height='640px';
      cardEl.style.width='';  // Fix 8: Reset inline width from mobile
      var bl=getBannerLayout(cw2);
      var textLeftPx=bl.textLeft;
      var cardLeft=cw2-textLeftPx-500;
      cardLeft=Math.max(textLeftPx, cardLeft);
      cardEl.style.left=cardLeft+'px';
      cardEl.style.top='50%';
      cardEl.style.transform='translateY(-50%)';
      cardEl.style.bottom='auto';
      container.style.minHeight='100vh';
    }
  }
  positionCard();

  var clockResponsiveOffsetX=0,clockResponsiveOffsetY=0;

  function updateClockResponsive(){
    var cW=w,cH=h;
    var vFov=55*Math.PI/180;
    var dist=camera.position.z-CC.posZ;
    var unitPx=cH/(2*Math.tan(vFov/2)*dist);

    var _bl=getBannerLayout(cW);
    var _tL=_bl.textLeft;
    var W_START=1650,W_END=1200,MIN_MARGIN=16;
    var W_CLAMP=1700,TARGET_DIST_TO_D=163; // Stała odległość zegar→D powyżej 1700px
    var _t=cW>=W_START?0:cW<=W_END?1:(W_START-cW)/(W_START-W_END);
    var curLeftMargin=_tL*(1-_t)+MIN_MARGIN*_t;
    var refLeftMargin=getBannerLayout(W_START).textLeft;
    var deltaMarginPx=curLeftMargin-refLeftMargin;
    var desiredPosX,desiredPosY;
    
    if(cW<1200){
      desiredPosX=0;
      if(layoutInfo.isMobile && layoutInfo.lh){
        var textCenterPx=layoutInfo.textTopPx - layoutInfo.lh*0.4;
        desiredPosY=(cH/2-textCenterPx)/unitPx;
        
        // Collision guard: zegar nie może nachodzić na tekst
        var clockHalfH = 0.9 * CC.scale * unitPx * 0.5;
        var clockBottomPx = (cH/2 - desiredPosY * unitPx) + clockHalfH;
        var textStartPx = layoutInfo.textTopPx;
        var minGap = 8;
        if(clockBottomPx > textStartPx - minGap){
          var overflowPx = clockBottomPx - (textStartPx - minGap);
          desiredPosY += overflowPx / unitPx;
        }
      } else {
        desiredPosY=CC.posY;
      }
      // Limit 50px od górnej krawędzi (mobile)
      var clockTopPxM=(cH/2-desiredPosY*unitPx)-(0.9*CC.scale*unitPx*0.5);
      if(clockTopPxM<50) desiredPosY-=(50-clockTopPxM)/unitPx;
    } else {
      desiredPosX=CC.posX+deltaMarginPx/unitPx;
      // FIX: Powyżej 1700px, utrzymuj stałą odległość od litery D
      if(cW>W_CLAMP){
        desiredPosX=(_tL+TARGET_DIST_TO_D-cW/2)/unitPx;
      }
      var clockLeftPx=(cW/2+desiredPosX*unitPx)-(4.4*CC.scale*unitPx*0.5);
      if(clockLeftPx<50) desiredPosX+=(50-clockLeftPx)/unitPx;
      desiredPosY=CC.posY;
      // Limit 50px od górnej krawędzi
      var clockTopPx=(cH/2-desiredPosY*unitPx)-(0.9*CC.scale*unitPx*0.5);
      if(clockTopPx<50) desiredPosY-=(50-clockTopPx)/unitPx;
    }
    clockResponsiveOffsetX=desiredPosX-CC.posX;
    clockResponsiveOffsetY=(desiredPosY!==undefined?desiredPosY:CC.posY)-CC.posY;
  }

  updateClockResponsive();

  var PHI=1.6180339887;
  var lev={rotX:0,rotY:0,rotZ:0};
  var levS={posX:CC.posX,posY:CC.posY,posZ:CC.posZ,rotX:CC.rotX,rotY:CC.rotY,rotZ:CC.rotZ};

  var spring={rotX:0,rotY:0,velRotX:0,velRotY:0};
  var SPRING_STIFF=0.18;
  var SPRING_DAMP=0.72;
  var levInf=0;

  var _lastTime = performance.now();

  var _onPointerMove = function(e){
    rawMouse.x=e.clientX; // V3: Cache raw, m2c() w loop()
    rawMouse.y=e.clientY;
  };
  window.addEventListener('pointermove', _onPointerMove, {passive:true});
  hfListeners.push({target:window,event:'pointermove',fn:_onPointerMove,options:{passive:true}});

  // V1: Visibility handling - zatrzymanie GSAP w tle
  var _onVisChange = function(){
    isPageVisible = !document.hidden;
    if(!isPageVisible){
      // Ukryty: zatrzymaj GSAP ale nie resetuj stanu
      if(activeTL){ activeTL.pause(); }
      if(nextCall){ nextCall.pause(); }
    } else {
      // Widoczny: wznów
      _lastTime = performance.now(); // Reset dt po wybudzeniu
      if(activeTL){ activeTL.resume(); }
      if(nextCall){ nextCall.resume(); }
    }
  };
  document.addEventListener('visibilitychange', _onVisChange);
  cleanups.push(function(){ document.removeEventListener('visibilitychange', _onVisChange); });

  tickFn = function(){
    if(!isPageVisible) { 
      return; 
    }

    // V3: Konwersja raz na klatkę (nie w evencie)
    var m=m2c(rawMouse.x,rawMouse.y);
    mouse.x=m.x;
    mouse.y=m.y;

    smooth.x+=(mouse.x-smooth.x)*P.lerp;
    smooth.y+=(mouse.y-smooth.y)*P.lerp;
    uMouse.value.set(smooth.x,smooth.y);

    mUV_x=smooth.x*0.5+0.5;
    mUV_y=smooth.y*0.5+0.5;

    var dx=mUV_x-textCenter.x,dy=mUV_y-textCenter.y;
    var prox=1.0-Math.min(Math.sqrt(dx*dx+dy*dy)/(textRadius*2.5),1.0);
    prox*=prox;
    U.uBulgeH.value+=(P.bulgeH*(0.35+0.65*prox)-U.uBulgeH.value)*0.08;

    // O3: Single performance.now() call
    var now = performance.now();
    var t = now * 0.001;
    lev.rotX = Math.sin(t*0.21)*0.22 + Math.sin(t*0.21*PHI)*0.022;
    lev.rotY = Math.sin(t*0.13)*0.13 + Math.sin(t*0.13*PHI)*0.013;
    lev.rotZ = Math.sin(t*0.11)*0.09 + Math.sin(t*0.11*PHI)*0.009;

    var levMult=(levFrozen?0:1);

    // ==============================================================
    // [ELITE V4.0 FIX] Czysta Architektura Wektorowa (The Real Deal)
    // ==============================================================
    
    // 1. FPS-independent dt
    var dt = Math.min((now - _lastTime) / 1000, 0.033);
    _lastTime = now;
    var dt60 = dt * 60.0;

    // 2. KOREKTA PARALAKSY (Z=clockZ na Z=0)
    var camZ = camera.position.z;
    var projScale = camZ / (camZ - levS.posZ);
    var optPosY = levS.posY + 0.11 * CC.scale * compScaleVal; // Wizualny środek szkła (+ w ThreeJS to góra)
    
    var projX = levS.posX * projScale;
    var projY = optPosY * projScale;

    // 3. Pozycja Zegara w Content UV (planeW synced w handleResize)
    var clockPlaneUvX = projX / planeW + 0.5;
    var clockPlaneUvY = projY / planeH + 0.5;
    
    var clockContentX = (clockPlaneUvX - cr.ox) / cr.sx;
    var clockContentY = (clockPlaneUvY - cr.oy) / cr.sy;
    
    // 4. Pozycja Kuli w Content UV
    // FIX MORDERCZY #1: mUV jest JUŻ w domenie Content UV! Żadnych double-transform!
    var ballContentX = mUV_x; 
    var ballContentY = mUV_y;

    // 5. ANIZOTROPOWY WEKTOR (zegar 5x szerszy niż wyższy)
    // Rozciągamy strefę uderzeniową w osi X o 60%
    var ASPECT_STRETCH_X = 1.6;
    var bdX = (clockContentX - ballContentX) / (P.bulgeX * ASPECT_STRETCH_X);
    var bdY = (clockContentY - ballContentY) / P.bulgeY;
    var dist = Math.sqrt(bdX * bdX + bdY * bdY);

    // 6. Dopaminowy Dead-Zone i Gaussian Derivative
    // Mniejsza strefa martwa = szybsze chwytanie skompresowanej prawej krawędzi
    var DEAD_ZONE = 0.20; 
    var distAdj = Math.max(0, dist - DEAD_ZONE);
    
    var GAUSS_K = 1.2; 
    var gradMag = distAdj * Math.exp(-GAUSS_K * distAdj * distAdj);

    // Bezpieczny wektor kierunkowy
    var invDist = dist > 0.001 ? 1.0 / dist : 0;
    var dirX = bdX * invDist;
    var dirY = bdY * invDist;

    // 7. TARGET ROTACJI z kompensacją iluzji optycznej CC.rotY
    var TILT_STRENGTH_X = 2.0; 
    var TILT_STRENGTH_Y = 1.2;
    
    // KOMPENSACJA ASYMETRII: dirX < 0 = kursor z prawej strony
    // Prawa strona musi pokonać bazowe wychylenie zegara (+18°)
    // Pompujemy więcej siły żeby przebić przez "martwą strefę" płaskiej pozycji
    var visualBoostY = (dirX < 0.0) ? 2.2 : 0.85;
    
    var springTargetRotX = -dirY * gradMag * TILT_STRENGTH_X;
    var springTargetRotY =  dirX * gradMag * TILT_STRENGTH_Y * visualBoostY;

    // 8. FPS-INDEPENDENT SPRING (Żelazna stabilność)
    var stiffDt = Math.min(SPRING_STIFF * dt60, 1.0);
    var dampDt = Math.pow(SPRING_DAMP, dt60);
    
    spring.velRotX += (springTargetRotX - spring.rotX) * stiffDt;
    spring.velRotY += (springTargetRotY - spring.rotY) * stiffDt;
    spring.velRotX *= dampDt;
    spring.velRotY *= dampDt;
    spring.rotX += spring.velRotX;
    spring.rotY += spring.velRotY;

    // 9. Influence (Wzbudzenie sprężyny z pełnym zachowaniem Bounce'a)
    // FIX MORDERCZY #3: LevInf nie może odciąć energii drgającej sprężyny, tylko miękko opaść
    var springEnergy = Math.abs(spring.rotX) + Math.abs(spring.rotY) + Math.abs(spring.velRotX) + Math.abs(spring.velRotY);
    var targetInf = (dist < 2.5 || springEnergy > 0.01) ? 1.0 : 0.0; 
    levInf += (targetInf - levInf) * (1.0 - Math.pow(0.96, dt60));

    // ==============================================================

    var finalPosX=CC.posX+clockResponsiveOffsetX;
    var finalPosY=CC.posY+clockResponsiveOffsetY;
    var finalPosZ=CC.posZ;
    var finalRotX=CC.rotX + lev.rotX*levMult*(1-levInf) + spring.rotX*levInf;
    var finalRotY=CC.rotY + lev.rotY*levMult*(1-levInf) + spring.rotY*levInf;
    var finalRotZ=CC.rotZ + lev.rotZ*levMult;

    var lerpSpeed=levFrozen?1.0:0.04;
    levS.posX+=(finalPosX-levS.posX)*lerpSpeed;
    levS.posY+=(finalPosY-levS.posY)*lerpSpeed;
    levS.posZ+=(finalPosZ-levS.posZ)*lerpSpeed;
    levS.rotX+=(finalRotX-levS.rotX)*lerpSpeed;
    levS.rotY+=(finalRotY-levS.rotY)*lerpSpeed;
    levS.rotZ+=(finalRotZ-levS.rotZ)*lerpSpeed;

    // O4: Jeden transform dla obu grup
    clockParent.position.set(levS.posX,levS.posY,levS.posZ);
    clockParent.scale.setScalar(CC.scale*compScaleVal);
    clockParent.rotation.set(levS.rotX,levS.rotY,levS.rotZ);
    renderer.render(scene,camera);
  };
  gsap.ticker.add(tickFn);
  ticking = true;

  // V2: Resize throttle z dirty check
  var resizePending=false, lastResizeW=w, lastResizeH=h;
  var _resizeRaf=null;
  var isKilled=false;
  function handleResize(){
    resizePending=false;
    _resizeRaf=null;
    if(isKilled || !renderer) return;
    var newW=el.clientWidth, newH=el.clientHeight;
    if(newW===w && newH===h) return; // Brak faktycznej zmiany
    
    var widthChanged = Math.abs(newW - lastResizeW) > 1;
    var aspectChanged = Math.abs(newW/newH - lastResizeW/lastResizeH) > 0.05;
    
    w=newW; h=newH;
    renderer.setSize(w,h);
    camera.aspect=w/h;
    camera.updateProjectionMatrix();
    
    // Pełny rebuild tylko gdy szerokość lub aspect się zmienił
    // (pomija rebuild dla samej zmiany wysokości - address bar)
    if(widthChanged || aspectChanged){
      lastResizeW=w; lastResizeH=h;
      var pw=planeH*(w/h);
      planeW=pw;  // Sync closure planeW
      mesh.geometry.dispose();
      mesh.geometry=new THREE.PlaneGeometry(pw,planeH,128,128); // R1: reduced tessellation
      var nt=makeTexture(w,h);
      U.uTexture.value.dispose();
      U.uTexture.value=nt.tex;
      textCenter=nt.textCenter;
      textRadius=nt.textRadius;
      compScaleVal=nt.compScale||1.0;
      layoutInfo=nt.layout||{};
    }
    
    // ZAWSZE sync cr + uniforms (tanie, 6 mnożeń)
    cr=getContentRect(w,h);
    U.uContentOffset.value.set(cr.ox,cr.oy);
    U.uContentScale.value.set(cr.sx,cr.sy);
    
    updateClockResponsive();
    positionCard();
  }
  
  var _onResize = function(){
    if(!resizePending){
      resizePending=true;
      _resizeRaf=requestAnimationFrame(handleResize);
    }
  };
  window.addEventListener('resize',_onResize);
  cleanups.push(function(){ window.removeEventListener('resize', _onResize); });

  for(var _i=0;_i<10;_i++)digitTex.push(buildDigitTex(_i));
  buildClock();

  nextCall=gsap.delayedCall(CYCLE,showDay);

  // === PAUSE / RESUME / KILL ===
  function pause(){
    if(ticking){ gsap.ticker.remove(tickFn); ticking=false; }
    _stopClockInterval();
    hfListeners.forEach(function(h){ h.target.removeEventListener(h.event, h.fn, h.options); });
  }

  function resume(){
    if(!ticking && tickFn){ gsap.ticker.add(tickFn); ticking=true; }
    _startClockInterval();
    hfListeners.forEach(function(h){ h.target.addEventListener(h.event, h.fn, h.options); });
  }

  function kill(){
    isKilled=true;
    if(_resizeRaf){cancelAnimationFrame(_resizeRaf);_resizeRaf=null;}
    pause();
    killAll();
    cleanups.forEach(function(fn){ try{ fn(); }catch(e){} });
    timerIds.forEach(function(t){
      if(t.type==='interval') clearInterval(t.id);
      else if(t.type==='timeout') clearTimeout(t.id);
      else if(t.type==='raf' && t.id!=null) cancelAnimationFrame(t.id);
    });
    observers.forEach(function(o){ if(o && o.disconnect) o.disconnect(); });
    // ENT-JS-02: Rejestracja aktualnych gsap instancji przed generic cleanup
    // killAll() już je zabił (szybka ścieżka), forEach poniżej = no-op safety net
    if(activeTL) gsapInstances.push(activeTL);
    if(nextCall) gsapInstances.push(nextCall);
    gsapInstances.forEach(function(inst){
      try{ if(inst && inst.revert) inst.revert(); }catch(e){}
      try{ if(inst && inst.kill) inst.kill(); }catch(e){}
    });
    if(renderer){
      // Fix 2: Full GPU cleanup
      try{ scene && (scene.environment=null); }catch(e){}
      try{ envRT && envRT.dispose && envRT.dispose(); }catch(e){} envRT=null;
      try{ mesh && mesh.geometry && mesh.geometry.dispose(); }catch(e){}
      try{ mat && mat.dispose(); }catch(e){}
      try{ U && U.uTexture && U.uTexture.value && U.uTexture.value.dispose(); }catch(e){}
      try{ glassGeo && glassGeo.dispose(); }catch(e){}
      try{ glassMat && glassMat.dispose(); }catch(e){}
      try{ dispMap && dispMap.dispose(); }catch(e){}
      if(digitTex && digitTex.length){
        for(var i=0;i<digitTex.length;i++){
          try{ digitTex[i] && digitTex[i].dispose(); }catch(e){}
        }
        digitTex.length=0;
      }
      if(dayTexCache){
        try{ dayTexCache.juzJest && dayTexCache.juzJest.dispose(); }catch(e){}
        if(dayTexCache.days){ for(var j=0;j<dayTexCache.days.length;j++){ try{ dayTexCache.days[j].dispose(); }catch(e){} } }
        dayTexCache=null;
      }
      renderer.dispose();
      if(renderer.domElement && renderer.domElement.parentNode){
        renderer.domElement.parentNode.removeChild(renderer.domElement);
      }
    }
  }

  return { pause:pause, resume:resume, kill:kill };
}

/* AUTOINIT_START — Pipeline: wyciągnij ten blok. Fabryka doda własny mechanizm init po fonts-ready. */
// AUTO-INIT
function _initSafe(){
  if(window.finalSection && typeof window.finalSection.kill === 'function') window.finalSection.kill();
  window.finalSection = init(document.getElementById('final-section'));
}

var _fontsPromise = (document.fonts && typeof document.fonts.load === 'function')
  ? document.fonts.load('700 340px Lexend', 'ĄŻŹŚĆĘŁŃÓ')
  : Promise.resolve();

_fontsPromise.then(_initSafe).catch(_initSafe);
/* AUTOINIT_END */
</script>
