@media(max-width:500px){#love-wall-section .card__expand-btn{display:flex;align-items:center;justify-content:center;width:29px;height:29px;padding:0;margin:-4px -4px -4px auto;border-radius:50%;border:1px solid var(--border-dark);background:var(--card-bg);color:var(--text-gray);font-size:20px;font-weight:300;line-height:1;cursor:pointer;transition:all 0.2s ease;flex-shrink:0;-webkit-tap-highlight-color:transparent;position:relative;overflow:visible}#love-wall-section .card__expand-btn::after{content:"";position:absolute;top:-7.5px;right:-7.5px;bottom:-7.5px;left:-7.5px}#love-wall-section .card__expand-btn:active{background:var(--text-gray);color:var(--card-bg);transform:scale(0.95)}#love-wall-section .card-shell.is-expanded .card__expand-btn{display:none}}

@media(hover:hover){#love-wall-section .row-viewport.is-hovering .card-shell:not(.is-active) .card-tilt{--lift-z:-15px;--card-scale:0.88}#love-wall-section .row-viewport.is-hovering .card-shell:not(.is-active) .card{opacity:0.12}#love-wall-section .row-viewport.is-hovering .card-shell.is-active{transform:translateZ(0) skewX(0deg) scaleX(1)}#love-wall-section .row-viewport.is-hovering .card-shell.is-active .card-tilt{--tilt-x:6deg;--lift-z:40px;--lift-y:14px;--card-scale:1.15;will-change:transform;transition:transform 0.8s cubic-bezier(0,0,0.2,1)}#love-wall-section .row-viewport.is-hovering .card-shell.is-active .card::before{opacity:1}#love-wall-section .row-viewport.is-hovering .card-shell.is-active .card{opacity:1;transition:opacity 0.4s ease-out}#love-wall-section .row-viewport.is-hovering .card-shell.is-active .card__quote{color:var(--text-primary);transform:translateZ(0.01px) scale(1.03) translateX(var(--text-x))}}
@keyframes love-wall-star-flip-pop{0%{transform:rotateY(0deg);fill:#ffc602}20%{transform:rotateY(90deg);fill:#ffc602}21%{fill:#bfbfbf}40%{transform:rotateY(180deg);fill:#bfbfbf}55%{transform:rotateY(180deg) scale(1);fill:#bfbfbf}70%{transform:rotateY(180deg) scale(1.4);fill:#fff}85%{transform:rotateY(180deg) scale(1.1);fill:#ffc602}100%{transform:rotateY(180deg) scale(1.1);fill:#ffc602}}
@media(hover:hover){#love-wall-section .row-viewport.is-hovering .card-shell.is-active .card__star{animation:love-wall-star-flip-pop 1.2s cubic-bezier(0.4,0,0.2,1) forwards}#love-wall-section .row-viewport.is-hovering .card-shell.is-active .card__star:nth-child(1){animation-delay:0s}#love-wall-section .row-viewport.is-hovering .card-shell.is-active .card__star:nth-child(2){animation-delay:0.05s}#love-wall-section .row-viewport.is-hovering .card-shell.is-active .card__star:nth-child(3){animation-delay:0.1s}#love-wall-section .row-viewport.is-hovering .card-shell.is-active .card__star:nth-child(4){animation-delay:0.15s}#love-wall-section .row-viewport.is-hovering .card-shell.is-active .card__star:nth-child(5){animation-delay:0.2s}}
#love-wall-section .card-shell.is-expanded .card__star{animation:love-wall-star-flip-pop 1.2s cubic-bezier(0.4,0,0.2,1) forwards}

#love-wall-section .card-shell.is-expanded .card__star:nth-child(4){animation-delay:0.15s}

#love-wall-section .row-viewport.has-expanded .card-shell:not(.is-expanded) .card-shell::before{display:none}

/* Hover: overflow:visible so scaled active card isn't clipped.
   Overlay stays at full width — no narrowing needed (overlays don't clip vertically like masks did). */
/* Mobile expand: identical overflow release + hide fades entirely */
#love-wall-section .row-viewport.has-expanded{overflow:visible}
#love-wall-section .row-clip:has(.row-viewport.has-expanded){overflow:visible}
#love-wall-section .row-clip.is-row-expanded > .row-fade{display:none}

@media(max-width:768px){
  #love-wall-section{--card-width:340px;--card-height:260px;--card-padding:24px;--card-gap:24px;--row-padding-block:40px;--row-padding-left:16px}

}
@media(max-width:500px){
  /* Direct clamp per property — no calc(length/length) dependency
     Formula: clamp(X×0.64, X/500×100vw, X) */
  #love-wall-section{--card-width:clamp(217.6px,68vw,340px);--card-height:clamp(166.4px,52vw,260px);--card-gap:clamp(15.36px,4.8vw,24px);--card-padding:clamp(15.36px,4.8vw,24px);--row-padding-block:clamp(25.6px,8vw,40px);--row-padding-left:clamp(10.24px,3.2vw,16px)}
  #love-wall-section .card__quote{font-size:clamp(0.8rem,4vw,1.25rem);margin-top:5px}
  #love-wall-section .card__quote--mobile-sm{font-size:clamp(0.672rem,3.36vw,1.05rem)}
  #love-wall-section .card__quote--mobile-md{font-size:clamp(0.608rem,3.04vw,0.95rem)}
  #love-wall-section .card__quote--mobile-lg{font-size:clamp(0.544rem,2.72vw,0.85rem)}
  #love-wall-section .card__rating-number{font-size:clamp(17.92px,5.6vw,28px)}
  #love-wall-section .card__name{font-size:clamp(0.6rem,3vw,0.9375rem)}
  #love-wall-section .card__star{width:clamp(17.92px,5.6vw,28px);height:clamp(17.92px,5.6vw,28px)}
  #love-wall-section .card__avatar{width:clamp(17.28px,5.4vw,27px);height:clamp(17.28px,5.4vw,27px)}
  #love-wall-section .card-shell.is-active::before{width:717px;height:457px}
  /* Mobile containment: rows-wrapper clips horizontal only — prevents iOS elastic scroll.
     overflow-x:clip does NOT coerce overflow-y (unlike hidden) → translateY offsets on rows stay visible.
     Does NOT create scroll container → GSAP ScrollTrigger unaffected. */
  #love-wall-section .rows-wrapper{overflow-x:clip}
  #love-wall-section .row-clip{overflow-clip-margin:200px}
  #love-wall-section .row-viewport{overflow-clip-margin:200px;touch-action:pan-y}
  /* Mobile: narrower fade (8%/60px) to not eat into card visible area on ≤375px */
  #love-wall-section .row-fade,
  #love-wall-section .mount-slot > .row-fade{width:min(8%,60px)}
  /* PERF FIX 1: Flat layers on idle cards.
     translateZ(0)+preserve-3d on 40 card-shells = ~80 GPU layers.
     On mobile: idle skew=0, scale=1, so translateZ(0) skewX(0) scaleX(1) ≡ none visually.
     Restore full transform only on active/expanded cards that need 3D tilt. */
  #love-wall-section .card-shell{transform:none;transform-style:flat}
  #love-wall-section .card-shell.is-active,
  #love-wall-section .card-shell.is-expanded{transform:translateZ(0) skewX(var(--row-skew,0deg)) scaleX(var(--row-scale,1));transform-style:preserve-3d}
  #love-wall-section .row-mover{transform-style:flat}
  /* PERF FIX 2: Move perspective from viewport (affects all 20 children) to card-tilt (only active).
     Eliminates per-frame reprojection of ~38 idle cards. */
  #love-wall-section .row-viewport{perspective:none}
  #love-wall-section .card-tilt{perspective:700px}
}
@media(prefers-reduced-motion:reduce){
  #love-wall-section .row-mover{will-change:auto}
  #love-wall-section .card-tilt,#love-wall-section .card,#love-wall-section .card::before,#love-wall-section .card::after,#love-wall-section .card__quote,#love-wall-section .card__star{transition:none!important;animation:none!important}
  #love-wall-section .row-viewport.is-hovering .card-shell:not(.is-active) .card-tilt{--lift-z:0;--card-scale:1}
  #love-wall-section .row-viewport.is-hovering .card-shell:not(.is-active) .card{opacity:0.4}
  #love-wall-section .row-viewport.is-hovering .card-shell.is-active .card-tilt{--tilt-x:0deg;--lift-z:0;--lift-y:-4px;--card-scale:1}
}

/* ============================================================
   SECTION CSS: love-wall — logo / kinetic typography (RENAMED + NAMESPACED)
   ============================================================ */
#love-wall-section #love-wall-logo-section * { margin: 0; padding: 0; box-sizing: border-box; }
#love-wall-section #love-wall-logo-section {
  display: block; width: 100%; position: relative;
  --vw-cap: 1.1vw;
}

  #love-wall-section #love-wall-logo-section { --vw-cap: 15.4px; }
}
#love-wall-section #love-wall-logo-section .love-wall-logo-inner {
  height: var(--vt-h, 100vh); width: 100%; position: relative;
  background: transparent; overflow: clip; overflow-clip-margin: 600px; display: flex;
  font-family: 'Lexend', system-ui, sans-serif; color: #1a1a1a;
  -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
}
#love-wall-section #love-wall-logo-section .track { position: absolute; top: 50%; left: 0; display: flex; align-items: center; white-space: nowrap; will-change: transform; padding-left: 5vw; }
#love-wall-section #love-wall-logo-section .word { display: inline-flex; margin-right: 8vw; line-height: 1; }

#love-wall-section #love-wall-logo-section .word[data-effect="rotate-3d-scale"] { overflow: visible !important; }

/* ═══ RAINBOW WOW — keyframe + styl na .char ═══ */
@keyframes love-wall-rainbow {
  0%   { background-position: 0% 50%; }
  100% { background-position: 200% 50%; }
}

#love-wall-section #love-wall-logo-section .word[data-effect="rotate-3d-scale"] .char {
  --color-1: 320 100% 50%;
  --color-2: 280 100% 50%;
  --color-3: 220 100% 60%;
  --color-4: 160 100% 50%;
  --color-5:  40 100% 50%;

  color: transparent !important;

  background-image: linear-gradient(
    90deg,
    hsl(var(--color-1)),
    hsl(var(--color-5)),
    hsl(var(--color-3)),
    hsl(var(--color-4)),
    hsl(var(--color-2))
  );
  background-size: 200% 100%;

  -webkit-background-clip: text;
  background-clip: text;

  animation: love-wall-rainbow 4s linear infinite;

          }

        if(expandedState.shell&&expandedState.pointerStart&&e.pointerId===expandedState.activePointerId){var wat=!expandedState.wasDrag;expandedState.activePointerId=null;expandedState.pointerStart=null;expandedState.wasDrag=false;if(wat){expandedState.suppressNextClick=true;collapseExpandedCard();}return;}
        if(!swipe.tracking||e.pointerId!==swipe.pointerId)return;
        var wd=swipe.dragging,crs=swipe.rowState,cri=swipe.rowId;swipe.tracking=false;swipe.pointerId=null;
        if(wd&&crs){var s=swipe.samples,vx=0;if(s.length>=2){var dt=(s[s.length-1].t-s[0].t)/1000;if(dt>0.01)vx=(s[s.length-1].x-s[0].x)/dt;}vx=Math.max(-2500,Math.min(2500,vx));if(Math.abs(vx)>60){var sp=cri==='row1'?SEG1:SEG2,sr=cri==='row1'?setRow1X:setRow2X,mom={v:vx};var tw=gsap.to(mom,{v:0,duration:Math.min(1.0,Math.abs(vx)/2000),ease:'power2.out',onUpdate:function(){crs.x+=mom.v*0.016;if(sp>0){while(crs.x<=-sp)crs.x+=sp;while(crs.x>0)crs.x-=sp;}sr(crs.x);},onComplete:function(){unfreezeRow(crs);}});gsapInstances.push(tw);}else unfreezeRow(crs);expandedState.suppressNextClick=true;}
      }
      addCleanup(document,'pointerup',onDocPU,undefined);
      function onDocPC(e){if(e.pointerId===expandedState.activePointerId){expandedState.activePointerId=null;expandedState.pointerStart=null;expandedState.wasDrag=false;}if(swipe.tracking&&e.pointerId===swipe.pointerId){if(swipe.dragging&&swipe.rowState)unfreezeRow(swipe.rowState);swipe.tracking=false;swipe.pointerId=null;}}
      addCleanup(document,'pointercancel',onDocPC,undefined);
      function onLoad(){measureSeam();scrollRuntime.requestRefresh('st-refresh');}
      addCleanup(window,'load',onLoad,{once:true});
      var wtr=false;
      function onVC(){if(document.hidden){wtr=state.tickerEnabled;if(state.tickerEnabled)stopTicker();}else{if(wtr){clearRowFocus(state.row1,row1Viewport);clearRowFocus(state.row2,row2Viewport);state.row1.speedScale.current=1;state.row2.speedScale.current=1;state.row1.motionVelocity=0;state.row1.physicsVelocity=0;state.row1.skew=0;state.row1.scale=1;state.row2.motionVelocity=0;state.row2.physicsVelocity=0;state.row2.skew=0;state.row2.scale=1;state.lastScrollY=scrollRuntime.getRawScroll();lastR1X=null;lastR2X=null;setRow1Skew('0deg');setRow1Scale('1');setRow2Skew('0deg');setRow2Scale('1');var tid=setTimeout(function(){startTicker();},300);timerIds.push(tid);}}}
      addCleanup(document,'visibilitychange',onVC,undefined);
      tickFn=tick; hfAttached=true;
      function pause(){if(ticking){gsap.ticker.remove(tickFn);ticking=false;}state.tickerEnabled=false;detachHfListeners();}
      function resume(){state.lastScrollY=scrollRuntime.getRawScroll();if(tickFn&&!ticking){gsap.ticker.add(tickFn);ticking=true;state.tickerEnabled=true;}attachHfListeners();}
      function kill(){pause();gyroDeactivate();cleanups.forEach(function(fn){try{fn();}catch(e){}});timerIds.forEach(function(id){if(id){try{clearTimeout(id);}catch(e){}try{clearInterval(id);}catch(e){}try{cancelAnimationFrame(id);}catch(e){}}});observers.forEach(function(o){if(o&&o.disconnect)o.disconnect();});gsapInstances.forEach(function(i){try{if(i&&i.revert)i.revert();}catch(e){}try{if(i&&i.kill)i.kill();}catch(e){}});}
      return{pause:pause,resume:resume,kill:kill};
    }

    // ═══ loveWallInit — wrapper ═══
    function loveWallInit(container) {
      var logoEl=container.querySelector('#love-wall-logo-section');
      var logoInstance=logoEl?loveWallLogoInit(logoEl):{pause:function(){},resume:function(){},kill:function(){}};
      var velocityInstance=loveWallVelocityInit(container);
      var _paused=false,_killed=false;
      var _io=null,_stIo=null,_ioDebounce=null,_settleTimer=null;
      function _getVH(){return(window.visualViewport?window.visualViewport.height:window.innerHeight)||800;}
      function _computeRootMargin(){var raw=Math.round(0.5*_getVH()),c=Math.min(1200,Math.max(200,raw));return c+'px 0px '+c+'px 0px';}
      function _ioCallback(entries){var e=entries[0];if(!e)return;if(e.isIntersecting){if(_paused&&!_killed){_paused=false;resume();}}else{if(!_paused&&!_killed){_paused=true;pause();}}}
      function _createIO(){if(_killed)return;if(_io)_io.disconnect();_io=new IntersectionObserver(_ioCallback,{rootMargin:_computeRootMargin()});_io.observe(container);}
      function _onVVResize(){clearTimeout(_ioDebounce);_ioDebounce=setTimeout(function(){if(!_killed)_createIO();},50);}
      function _onResizeIO(){_onVVResize();}
      _createIO();
      if(window.visualViewport)window.visualViewport.addEventListener('resize',_onVVResize,{passive:true});
      window.addEventListener('resize',_onResizeIO,{passive:true});
      _stIo=new IntersectionObserver(function(entries){var e=entries[0];if(!e||!e.isIntersecting)return;scrollRuntime.requestRefresh('section-in-view');if(_stIo){_stIo.disconnect();_stIo=null;}},{threshold:0,rootMargin:'0px'});
      _stIo.observe(container);
      _settleTimer=setTimeout(function(){scrollRuntime.requestRefresh('layout-settle');},1000);
      function pause(){velocityInstance.pause();logoInstance.pause();}
      function resume(){logoInstance.resume();velocityInstance.resume();}
      function kill(){if(_killed)return;_killed=true;if(_io){_io.disconnect();_io=null;}if(_stIo){_stIo.disconnect();_stIo=null;}clearTimeout(_ioDebounce);clearTimeout(_settleTimer);if(window.visualViewport)window.visualViewport.removeEventListener('resize',_onVVResize);window.removeEventListener('resize',_onResizeIO);velocityInstance.kill();logoInstance.kill();}
      return{pause:pause,resume:resume,kill:kill};
    }

    document.addEventListener('DOMContentLoaded', function() {
      var el = document.getElementById('love-wall-section');
      if (!el) throw new Error('[PREVIEW] Missing #love-wall-section');
      window.loveWallPreview = loveWallInit(el);
    });
